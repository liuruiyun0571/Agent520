            font-size: 1.1em;

        }
        .nav-tab:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .nav-tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-box {
            max-width: 600px;
            margin: 0 auto 30px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 18px 25px 18px 55px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            outline: none;
            transition: all 0.3s ease;
        }
        .search-box input:focus { box-shadow: 0 15px 50px rgba(0,0,0,0.2); }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3em;
        }
        .search-box .clear-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #f0f0f0;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .search-box .clear-btn.visible { display: flex; }
        .content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            min-height: 500px;
        }
        .tab-content { display: none; }

            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 0.95em;
        }
        .stat-card span { font-size: 1.5em; font-weight: bold; margin-right: 5px; }
        .hotel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
        }
        .hotel-card {
            background: linear-gradient(145deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 25px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
        }
        .hotel-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .hotel-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .hotel-star {

            color: #333;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .hotel-info {

            gap: 8px;
            color: #555;
            font-size: 0.9em;
        }
        .hotel-info-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .hotel-info-label {
            color: #667eea;
            font-weight: 600;
            min-width: 70px;
            flex-shrink: 0;
        }
        .hotel-info-value { flex: 1; word-break: break-all; }
        .room-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        .room-table th {
            background: #667eea;
            color: white;
            padding: 10px 8px;
            text-align: left;
        }
        .room-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .price-original { text-decoration: line-through; color: #999; }
        .price-deal { color: #e74c3c; font-weight: bold; }
        .restaurant-grid {

        .restaurant-info-label {

        function renderHotels(hotels, containerId, noResultsId) {
            const container = document.getElementById(containerId);
            const noResults = document.getElementById(noResultsId);
            
            if (hotels.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            container.innerHTML = hotels.map(hotel => `
                <div class="hotel-card" data-search="${(hotel.name + ' ' + hotel.location + ' ' + hotel.contact + ' ' + hotel.note + ' ' + hotel.rooms.map(r => r.type).join(' ')).toLowerCase()}">
                    <div class="hotel-name">
                        ${hotel.name}
                        <span class="hotel-star">${hotel.star}</span>
                    </div>
                    <div class="hotel-info">
                        <div class="hotel-info-row">
                            <span class="hotel-info-label">📍 地点</span>
                            <span class="hotel-info-value">${hotel.location || '-'}</span>
                        </div>
                        <div class="hotel-info-row">
                            <span class="hotel-info-label">📞 联系</span>
                            <span class="hotel-info-value">${hotel.contact || '-'}</span>
                        </div>
                        <div class="hotel-info-row">
                            <span class="hotel-info-label">🏷️ 类型</span>
                            <span class="hotel-info-value">${hotel.type}</span>
                        </div>
                        ${hotel.note ? `
                        <div class="hotel-info-row">
                            <span class="hotel-info-label">📝 备注</span>
                            <span class="hotel-info-value">${hotel.note}</span>
                        </div>
                        ` : ''}
                    </div>
                    <table class="room-table">
                        <thead>
                            <tr>
                                <th>房型</th>
                                <th>门市价</th>
                                <th>协议价</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${hotel.rooms.map(room => `
                                <tr>
                                    <td>${room.type}</td>
                                    <td class="price-original">${room.price ? '¥' + room.price : '-'}</td>
                                    <td class="price-deal">${room.deal}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function renderRestaurants(restaurants, containerId, noResultsId) {
            const container = document.getElementById(containerId);
            const noResults = document.getElementById(noResultsId);
            
            if (restaurants.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            container.innerHTML = restaurants.map((restaurant, index) => `
                <div class="restaurant-card" data-search="${(restaurant.name + ' ' + restaurant.address + ' ' + restaurant.contact + ' ' + restaurant.note).toLowerCase()}">
                    <div class="restaurant-name">
                        <span class="restaurant-number">${index + 1}</span>
                        ${restaurant.name}
                    </div>
                    <div class="restaurant-info">
                        <div class="restaurant-info-row">
                            <span class="restaurant-info-label">👤 联系人</span>
                            <span class="restaurant-info-value">${restaurant.contact || '-'}</span>
                        </div>
                        <div class="restaurant-info-row">
                            <span class="restaurant-info-label">📞 电话</span>
                            <span class="restaurant-info-value">
                                <a href="tel:${restaurant.phone}" class="phone-link">${restaurant.phone}</a>
                            </span>
                        </div>
                        <div class="restaurant-info-row">
                            <span class="restaurant-info-label">📍 地址</span>
                            <span class="restaurant-info-value">${restaurant.address || '-'}</span>
                        </div>
                    </div>
                    ${restaurant.note ? `
                    <div class="restaurant-note">
                        <strong>💡 特色：</strong>${restaurant.note}
                    </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function performSearch(keyword) {
            const lowerKeyword = keyword.toLowerCase().trim();
            
            ['hzHotelGrid', 'hzRestGrid', 'bjHotelGrid'].forEach((gridId, idx) => {
                const cards = document.querySelectorAll('#' + gridId + ' > div');
                const noResultsId = ['hzHotelNoResults', 'hzRestNoResults', 'bjHotelNoResults'][idx];
                let visible = 0;
                cards.forEach(card => {
                    const searchText = card.getAttribute('data-search') || '';
                    if (!lowerKeyword || searchText.includes(lowerKeyword)) {
                        card.style.display = 'block';
                        visible++;
                    } else {
                        card.style.display = 'none';
                    }
                });
                document.getElementById(noResultsId).style.display = visible === 0 && lowerKeyword ? 'block' : 'none';
            });
        }

        function init() {
            renderHotels(hzHotels, 'hzHotelGrid', 'hzHotelNoResults');
            renderRestaurants(hzRestaurants, 'hzRestGrid', 'hzRestNoResults');
            renderHotels(bjHotels, 'bjHotelGrid', 'bjHotelNoResults');
            
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
            
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            
            searchInput.addEventListener('input', (e) => {
                performSearch(e.target.value);
                clearBtn.classList.toggle('visible', e.target.value.length > 0);
            });
            
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                performSearch('');
                clearBtn.classList.remove('visible');
                searchInput.focus();
            });
        }

        init();
    </script>
